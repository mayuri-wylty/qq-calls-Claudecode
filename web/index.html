<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QQ Claude Bot 配置</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f8;
      --panel: #ffffff;
      --text: #1d2528;
      --muted: #637176;
      --line: #d8e0e3;
      --accent: #187b80;
      --accent-dark: #0f5f63;
      --danger: #b42318;
      --soft: #e7f2f3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    }
    header {
      background: #102f33;
      color: #fff;
      padding: 22px 28px;
    }
    header h1 {
      margin: 0 0 6px;
      font-size: 22px;
      letter-spacing: 0;
    }
    header p {
      margin: 0;
      color: #c5d7da;
      font-size: 14px;
    }
    main {
      max-width: 1080px;
      margin: 24px auto;
      padding: 0 18px 40px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 18px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
    }
    section + section { margin-top: 18px; }
    h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      color: var(--muted);
      font-size: 13px;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
    }
    textarea { min-height: 92px; resize: vertical; }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    button:hover { background: var(--accent-dark); }
    button.secondary {
      color: var(--accent);
      background: var(--soft);
    }
    button.secondary:hover { background: #d4e9eb; }
    button.danger { background: var(--danger); }
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 38px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfc;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      background: #e8eff0;
      font-size: 13px;
    }
    .tag button {
      padding: 0;
      color: var(--danger);
      background: transparent;
      font-size: 16px;
      line-height: 1;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    .status-item:last-child { border-bottom: 0; }
    .status-item span:first-child { color: var(--muted); }
    .status-item strong {
      text-align: right;
      word-break: break-all;
    }
    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: 12px;
    }
    .message {
      margin-top: 12px;
      color: var(--accent-dark);
      min-height: 20px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .link-line {
      display: block;
      margin-top: 8px;
      color: var(--accent);
      font-size: 13px;
      word-break: break-all;
    }
    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>QQ Claude Bot 配置</h1>
    <p>个人 QQ 私聊接入，使用 NapCatQQ + OneBot v11。</p>
  </header>

  <main>
    <div>
      <section>
        <h2>基本设置</h2>
        <label for="trigger_prefix">触发词</label>
        <input id="trigger_prefix" placeholder="/ai " />

        <label for="thinking_msg">处理中提示语</label>
        <input id="thinking_msg" placeholder="收到，正在处理..." />

        <div class="row">
          <div>
            <label for="claude_timeout">Claude 超时秒数</label>
            <input id="claude_timeout" type="number" min="10" max="600" />
          </div>
          <div>
            <label for="max_chunk_size">单条最大长度</label>
            <input id="max_chunk_size" type="number" min="100" max="3000" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="onebot_api_base">NapCat OneBot API 地址</label>
            <input id="onebot_api_base" placeholder="http://127.0.0.1:3000" />
          </div>
          <div>
            <label for="onebot_access_token">Access Token</label>
            <input id="onebot_access_token" placeholder="未配置则留空" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="bot_host">Bot 上报监听地址</label>
            <input id="bot_host" />
          </div>
          <div>
            <label for="bot_port">Bot 上报监听端口</label>
            <input id="bot_port" type="number" min="1" max="65535" />
          </div>
        </div>
      </section>

      <section>
        <h2>QQ 白名单</h2>
        <div id="whitelist" class="tag-list"></div>
        <div class="row">
          <div>
            <label for="new_qq">添加 QQ 号</label>
            <input id="new_qq" inputmode="numeric" placeholder="123456789" />
          </div>
          <div>
            <label>&nbsp;</label>
            <button type="button" onclick="addQQ()">添加</button>
            <button class="secondary" type="button" onclick="fillSelfQQ()">填入当前登录 QQ</button>
          </div>
        </div>
        <p class="hint">白名单为空时所有私聊 QQ 都可触发。正式使用建议只填写自己的 QQ 号。</p>
      </section>

      <section>
        <h2>机器人账号</h2>
        <label for="bot_qq">快速登录 QQ</label>
        <input id="bot_qq" inputmode="numeric" placeholder="例如 100000000" />
        <div class="actions">
          <button type="button" onclick="switchNapCat()">切换并重启 NapCat</button>
          <button class="secondary" type="button" onclick="restartNapCat()">按当前配置重启</button>
          <button class="secondary" type="button" onclick="startQrLogin()">二维码登录</button>
        </div>
        <p class="hint">切换会关闭当前 NapCat/QQ，再用此 QQ 快速登录。二维码登录会取消快速登录参数。</p>
      </section>
    </div>

    <aside>
      <section>
        <h2>运行状态</h2>
        <div class="status-item"><span>OneBot 连接</span><strong id="onebot_ok">-</strong></div>
        <div class="status-item"><span>当前登录 QQ</span><strong id="self_id">-</strong></div>
        <div class="status-item"><span>昵称</span><strong id="nickname">-</strong></div>
        <div class="status-item"><span>Bot 状态</span><strong id="bot_running">-</strong></div>
        <div class="status-item"><span>NapCat 状态</span><strong id="napcat_running">-</strong></div>
        <div class="status-item"><span>启动脚本 QQ</span><strong id="launcher_qq">-</strong></div>
        <div class="status-item"><span>今日触发</span><strong id="today_trigger_count">0</strong></div>
        <a id="webui_link" class="link-line" href="#" target="_blank" rel="noreferrer">NapCat WebUI</a>
        <div class="actions">
          <button type="button" onclick="saveConfig()">保存配置</button>
          <button class="secondary" type="button" onclick="restartBot()">启动/重启 Bot</button>
        </div>
        <div id="message" class="message"></div>
      </section>
    </aside>
  </main>

  <script>
    let config = {};

    async function api(path, options) {
      const response = await fetch(path, options);
      if (!response.ok) throw new Error(await response.text());
      return response.json();
    }

    function setMessage(text) {
      document.getElementById("message").textContent = text;
    }

    function renderWhitelist() {
      const box = document.getElementById("whitelist");
      box.innerHTML = "";
      const list = config.whitelist || [];
      if (!list.length) {
        box.textContent = "当前为空";
        return;
      }
      for (const qq of list) {
        const tag = document.createElement("span");
        tag.className = "tag";
        tag.innerHTML = `<span>${qq}</span>`;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = "×";
        btn.onclick = () => {
          config.whitelist = config.whitelist.filter(item => item !== qq);
          renderWhitelist();
        };
        tag.appendChild(btn);
        box.appendChild(tag);
      }
    }

    function readForm() {
      config.trigger_prefix = document.getElementById("trigger_prefix").value;
      config.thinking_msg = document.getElementById("thinking_msg").value;
      config.claude_timeout = Number(document.getElementById("claude_timeout").value || 120);
      config.max_chunk_size = Number(document.getElementById("max_chunk_size").value || 500);
      config.onebot_api_base = document.getElementById("onebot_api_base").value;
      config.onebot_access_token = document.getElementById("onebot_access_token").value;
      config.bot_host = document.getElementById("bot_host").value;
      config.bot_port = Number(document.getElementById("bot_port").value || 18089);
    }

    function writeForm() {
      for (const key of ["trigger_prefix", "thinking_msg", "onebot_api_base", "onebot_access_token", "bot_host"]) {
        document.getElementById(key).value = config[key] || "";
      }
      document.getElementById("claude_timeout").value = config.claude_timeout || 120;
      document.getElementById("max_chunk_size").value = config.max_chunk_size || 500;
      document.getElementById("bot_port").value = config.bot_port || 18089;
      renderWhitelist();
    }

    function addQQ() {
      const input = document.getElementById("new_qq");
      const value = input.value.trim();
      if (!/^\d+$/.test(value)) {
        setMessage("QQ 号只能包含数字。");
        return;
      }
      config.whitelist = Array.from(new Set([...(config.whitelist || []), value]));
      input.value = "";
      renderWhitelist();
    }

    async function fillSelfQQ() {
      try {
        const data = await api("/api/me");
        if (!data.ok || !data.user_id) {
          setMessage("未获取到当前登录 QQ，请确认 NapCatQQ 已启动。");
          return;
        }
        config.whitelist = Array.from(new Set([...(config.whitelist || []), String(data.user_id)]));
        renderWhitelist();
        setMessage("已填入当前登录 QQ。");
      } catch (error) {
        setMessage(`查询失败：${error.message}`);
      }
    }

    async function loadConfig() {
      config = await api("/api/config");
      writeForm();
    }

    async function saveConfig() {
      readForm();
      await api("/api/config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(config)
      });
      setMessage("配置已保存。");
      refreshStatus();
    }

    async function restartBot() {
      readForm();
      await saveConfig();
      const data = await api("/api/restart", { method: "POST" });
      setMessage(`Bot 已启动，PID：${data.pid}`);
      setTimeout(refreshStatus, 800);
    }

    async function switchNapCat() {
      const qq = document.getElementById("bot_qq").value.trim();
      if (!/^\d{5,12}$/.test(qq)) {
        setMessage("请输入正确的 QQ 号。");
        return;
      }
      const data = await api("/api/napcat/switch", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ qq })
      });
      setMessage(`NapCat 已重启，PID：${data.pid}，快速登录 QQ：${qq}`);
      setTimeout(refreshStatus, 2500);
    }

    async function restartNapCat() {
      const data = await api("/api/napcat/restart", { method: "POST" });
      setMessage(`NapCat 已按当前启动脚本重启，PID：${data.pid}`);
      setTimeout(refreshStatus, 2500);
    }

    async function startQrLogin() {
      const data = await api("/api/napcat/qrcode", { method: "POST" });
      setMessage(`NapCat 已切换为二维码登录，PID：${data.pid}。请查看 NapCat 窗口扫码。`);
      setTimeout(refreshStatus, 2500);
    }

    async function refreshStatus() {
      try {
        const status = await api("/api/status");
        const napcat = status.napcat || {};
        document.getElementById("onebot_ok").textContent = status.onebot_ok ? "正常" : "未连接";
        document.getElementById("self_id").textContent = status.self_id || "-";
        document.getElementById("nickname").textContent = status.nickname || "-";
        document.getElementById("bot_running").textContent = status.bot_running ? "运行中" : "未启动";
        document.getElementById("napcat_running").textContent = napcat.running ? `运行中(${napcat.process_count})` : "未启动";
        document.getElementById("launcher_qq").textContent = napcat.launcher_qq || "二维码登录";
        document.getElementById("today_trigger_count").textContent = status.today_trigger_count || 0;
        document.getElementById("bot_qq").value = napcat.launcher_qq || status.self_id || "";
        const link = document.getElementById("webui_link");
        link.href = napcat.webui_url || "#";
        link.textContent = napcat.webui_url ? `NapCat WebUI：${napcat.webui_url}` : "NapCat WebUI";
      } catch (error) {
        setMessage(`状态刷新失败：${error.message}`);
      }
    }

    loadConfig().then(refreshStatus);
    setInterval(refreshStatus, 5000);
  </script>
</body>
</html>
